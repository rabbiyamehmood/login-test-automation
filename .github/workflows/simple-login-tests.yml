name: Simple Login Tests

# When to run this workflow
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  # Manual trigger  
  workflow_dispatch:

jobs:
  login-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    # Step 1: Get the code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Setup Node.js
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    # Step 3: Install dependencies
    - name: Install dependencies
      run: |
        npm ci
        npx playwright install chromium

    # Step 4: Run login tests
    - name: Run Login Tests
      run: |
        npx playwright test tests/simple-login.spec.js --project=chromium --reporter=html,json
      env:
        CI: true

    # Step 5: Upload test results (if tests fail)
    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: login-test-results
        path: |
          playwright-report/
          test-results/
        retention-days: 7

    # Step 6: Comment on PR with results
    - name: Comment PR with Test Results
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('test-results/results.json')) {
            const results = JSON.parse(fs.readFileSync('test-results/results.json', 'utf8'));
            const passed = results.stats.expected || 0;
            const failed = results.stats.unexpected || 0;
            const total = passed + failed;
            
            const status = failed === 0 ? '✅ PASSED' : '❌ FAILED';
            
            const comment = `## 🎭 Login Test Results
            
            **Status**: ${status}
            **Tests**: ${passed}/${total} passed
            **Duration**: ${Math.round(results.stats.duration / 1000)}s
            
            ${failed > 0 ? '❌ Some tests failed. Check the detailed report in Actions.' : '✅ All login tests passed!'}
            
            [View Details](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }